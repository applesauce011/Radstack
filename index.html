  <head>

    <!-- Primary SEO -->

    <link rel="canonical" href="https://radiologystack.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://radiologystack.com/og-image.png" />

    <!-- Structured Data: WebSite (controls site name shown in Google search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RadiologyStack",
      "url": "https://radiologystack.com"
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RadiologyStack",
      "url": "https://radiologystack.com",
      "logo": "https://radiologystack.com/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "email": "radiologystack@gmail.com"
      },
      "description": "High-yield radiology flashcards for Canadian Royal College (FRCPC) and American Board of Radiology (ABR) board exam preparation."
    }
    </script>

    <!-- Structured Data: Educational Software -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RadiologyStack",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web, iOS, Android",
      "url": "https://radiologystack.com",
      "description": "High-yield radiology flashcards covering all 12 subspecialties for Canadian Royal College (FRCPC) and ABR board exam preparation. Includes progress tracking, smart study modes, and Radiopaedia integration.",
      "screenshot": "https://radiologystack.com/og-image.png",
      "offers": [
        {
          "@type": "Offer",
          "name": "3-Month Access",
          "price": "49.00",
          "priceCurrency": "USD",
          "description": "Full access to all 12 radiology subspecialty flashcard decks for 90 days"
        },
        {
          "@type": "Offer",
          "name": "12-Month Access",
          "price": "99.00",
          "priceCurrency": "USD",
          "description": "Full access to all 12 radiology subspecialty flashcard decks for 1 year"
        },
        {
          "@type": "Offer",
          "name": "Lifetime Access",
          "price": "149.00",
          "priceCurrency": "USD",
          "description": "Permanent access to all radiology flashcard decks including future content"
        }
      ],
      "educationalLevel": "PostSecondary",
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student",
        "audienceType": "Radiology residents, medical students, diagnostic radiology fellows"
      },
      "inLanguage": "en",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1"
      }
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is RadiologyStack useful for the Royal College FRCPC exam?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. RadiologyStack flashcards are aligned with the Royal College Diagnostic Radiology exam objectives, covering all 12 subspecialties tested on the written and oral FRCPC exams. Each card targets high-yield facts mapped to exam objectives."
          }
        },
        {
          "@type": "Question",
          "name": "Does RadiologyStack cover the ABR Core and Certifying exams?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The flashcard content covers ABR Core Exam physics, anatomy, and clinical radiology, as well as high-yield topics for the ABR Certifying Exam. All 12 subspecialties are included."
          }
        },
        {
          "@type": "Question",
          "name": "How many flashcards are in RadiologyStack?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "RadiologyStack contains over 1000 high-yield flashcards across 12 radiology subspecialties: neuroradiology, chest, MSK, abdominal, breast, genitourinary, pediatric, nuclear medicine, interventional radiology, emergency radiology, cardiac imaging, and imaging physics."
          }
        },
        {
          "@type": "Question",
          "name": "Can I try RadiologyStack for free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. RadiologyStack offers a free deck from every subspecialty — 12 free decks in total — with no account required. A free account lets you save your progress. Premium plans unlock every deck across all 12 subspecialties."
          }
        }
      ]
    }
    </script>
